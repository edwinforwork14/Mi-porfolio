<svg xmlns="http://www.w3.org/2000/svg" width="600" height="700" viewBox="0 0 600 700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#200D42"/>
      <stop offset="50%" style="stop-color:#A33580"/>
      <stop offset="100%" style="stop-color:#E28E44"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A33580;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#E28E44;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="300" cy="320" r="220" fill="url(#glow)"/>
  <!-- Head -->
  <ellipse cx="300" cy="280" rx="80" ry="90" fill="url(#bg)" opacity="0.9"/>
  <!-- Hair -->
  <path d="M220 250 Q220 160 300 150 Q380 160 380 250" fill="#200D42" stroke="#A33580" stroke-width="2"/>
  <!-- Eyes -->
  <ellipse cx="275" cy="275" rx="12" ry="6" fill="white" opacity="0.9"/>
  <ellipse cx="325" cy="275" rx="12" ry="6" fill="white" opacity="0.9"/>
  <circle cx="275" cy="275" r="5" fill="#200D42"/>
  <circle cx="325" cy="275" r="5" fill="#200D42"/>
  <!-- Nose -->
  <path d="M298 285 L302 295 L296 295" fill="none" stroke="#A33580" stroke-width="2" stroke-linecap="round"/>
  <!-- Mouth -->
  <path d="M280 310 Q300 325 320 310" fill="none" stroke="#E28E44" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="280" y="365" width="40" height="40" rx="5" fill="url(#bg)" opacity="0.8"/>
  <!-- Shoulders -->
  <path d="M200 420 Q200 390 260 390 L340 390 Q400 390 400 420 L400 450 L200 450 Z" fill="url(#bg)" opacity="0.8"/>
  <!-- Body lines -->
  <line x1="260" y1="420" x2="260" y2="450" stroke="#A33580" stroke-width="1.5" opacity="0.5"/>
  <line x1="340" y1="420" x2="340" y2="450" stroke="#A33580" stroke-width="1.5" opacity="0.5"/>
  <!-- Particles -->
  <circle cx="180" cy="200" r="3" fill="#A33580" opacity="0.6" filter="url(#neon)"/>
  <circle cx="420" cy="180" r="4" fill="#E28E44" opacity="0.5" filter="url(#neon)"/>
  <circle cx="160" cy="350" r="2" fill="#A33580" opacity="0.4"/>
  <circle cx="440" cy="300" r="3" fill="#E28E44" opacity="0.5"/>
  <circle cx="200" cy="430" r="2" fill="#A33580" opacity="0.3"/>
  <circle cx="400" cy="400" r="2.5" fill="#E28E44" opacity="0.4"/>
  <!-- Bottom text -->
  <text x="300" y="520" text-anchor="middle" font-family="monospace" font-size="10" fill="#A33580" opacity="0.6">PLACEHOLDER</text>
  <text x="300" y="540" text-anchor="middle" font-family="monospace" font-size="10" fill="#E28E44" opacity="0.4">Replace with your character PNG</text>
</svg>
