<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C0C0C0"/>
      <stop offset="50%" style="stop-color:#E8E8E8"/>
      <stop offset="100%" style="stop-color:#808080"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="60" fill="url(#silver)" opacity="0.8" filter="url(#glow)"/>
  <ellipse cx="80" cy="80" rx="30" ry="20" fill="white" opacity="0.3" transform="rotate(-30 80 80)"/>
  <path d="M60 120 Q100 140 140 120" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
</svg>
