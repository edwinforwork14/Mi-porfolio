<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="50%" style="stop-color:#7BB8F5"/>
      <stop offset="100%" style="stop-color:#2C5F8A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <polygon points="100,30 130,90 170,110 130,130 100,170 70,130 30,110 70,90" fill="url(#blue)" opacity="0.8" filter="url(#glow)"/>
  <polygon points="100,50 120,95 150,110 120,120 100,150 80,120 50,110 80,95" fill="white" opacity="0.15"/>
</svg>
