<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#DDA0DD"/>
      <stop offset="50%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#6C3483"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(100,100)" filter="url(#glow)">
    <ellipse cx="0" cy="-30" rx="15" ry="40" fill="url(#purple)" opacity="0.8" transform="rotate(0)"/>
    <ellipse cx="0" cy="-30" rx="15" ry="40" fill="url(#purple)" opacity="0.8" transform="rotate(60)"/>
    <ellipse cx="0" cy="-30" rx="15" ry="40" fill="url(#purple)" opacity="0.8" transform="rotate(120)"/>
    <ellipse cx="0" cy="-30" rx="15" ry="40" fill="url(#purple)" opacity="0.8" transform="rotate(180)"/>
    <ellipse cx="0" cy="-30" rx="15" ry="40" fill="url(#purple)" opacity="0.8" transform="rotate(240)"/>
    <ellipse cx="0" cy="-30" rx="15" ry="40" fill="url(#purple)" opacity="0.8" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="12" fill="#F5E6FF" opacity="0.9"/>
  </g>
</svg>
