<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="50%" style="stop-color:#E74C3C"/>
      <stop offset="100%" style="stop-color:#C0392B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <path d="M100,170 C30,110 10,60 40,35 C60,20 80,25 100,50 C120,25 140,20 160,35 C190,60 170,110 100,170Z" fill="url(#red)" opacity="0.85"/>
    <ellipse cx="100" cy="60" rx="30" ry="15" fill="white" opacity="0.2" transform="rotate(-15 100 60)"/>
  </g>
</svg>
